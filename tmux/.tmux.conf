# Reload config
unbind r
bind r source-file ~/.tmux.conf

# Ensure common binary paths are available in tmux (display-popup, run-shell, etc.)
set-environment -g PATH "\
$HOME/go/bin:\
$HOME/.local/bin:\
$HOME/.cargo/bin:\
$PATH"

# Carga TPM
set -g @plugin 'tmux-plugins/tpm'

# tested options for tmux compatibility
set -g @plugin 'tmux-plugins/tmux-sensible'

# Clipboard management
set -g @plugin 'tmux-plugins/tmux-yank'

# Tmux navigation
# set -g @plugin 'christoomey/vim-tmux-navigator'

# Tmux Resurrect
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Which key
set -g @plugin 'alexwforsythe/tmux-which-key'

######################################
# Floating window
######################################

bind C-y display-popup \
  -d "#{pane_current_path}" \
  -w 80% \
  -h 80% \
  -E "lazygit"

# Floating window with detach on destroy option for the scratch session
bind-key -n M-g if-shell -F '#{==:#{session_name},scratch}' {
  detach-client
} {
  # Keep scratch ephemeral so killing it closes the popup client.
  display-popup -d "#{pane_current_path}" -E "tmux has-session -t scratch 2>/dev/null || tmux new-session -d -s scratch -c '#{pane_current_path}'; tmux set-option -t scratch detach-on-destroy on; tmux attach-session -t scratch"
}

######################################
# Themes
######################################

# Tema kanagawa
set -g @plugin 'Nybkox/tmux-kanagawa'
set -g @kanagawa-theme 'wave'
set -g @kanagawa-plugins 'git cpu-usage ram-usage'
set -g @kanagawa-ignore-window-colors true

# -- terminal & key handling
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -s extended-keys on
set -as terminal-features 'tmux*:extkeys'

# Modo vim
set -g mode-keys vi

if-shell 'uname | grep -q Darwin' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip"'

# Keymaps
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind e copy-mode

# Bind split down (d) or split vertical (v)
bind c new-window -c "#{pane_current_path}"
unbind %
unbind '"'
bind v split-window -h -c "#{pane_current_path}"
bind d split-window -v -c "#{pane_current_path}"

# Mouse support
set -g mouse on

# When the attached session is killed, switch to another tmux session
# instead of detaching the client; this avoids closing WezTerm when it
# launches directly into tmux.
set -g detach-on-destroy off

# Status bar position
set -g status-position top

# Kill all sessions except current
bind K confirm-before -p "Kill all other sessions? (y/n)" "kill-session -a"

# Kill current session
bind X confirm-before -p "Kill this session? (y/n)" "kill-session"

# Find index
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Custom window fast navigation option (experimental)
bind -n M-j previous-window
bind -n M-k next-window
bind -n M-n command-prompt -p "New session name:" "new-session -c '#{pane_current_path}' -s '%%'"
bind -n M-l choose-tree -s

# TMP init
run '~/.tmux/plugins/tpm/tpm'
